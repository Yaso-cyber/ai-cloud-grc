services:
  - type: web
    name: ai-cloud-grc-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MOCK_MODE
        value: "true"
      - key: STUB_AI
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "https://ai-cloud-grc.vercel.app"
      - key: OPENAI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1
    healthCheckPath: /health
